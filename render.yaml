services:
  - type: web
    name: linbo-platform
    runtime: node
    plan: starter
    region: singapore
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://ljlgwwynijqauksljvya.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: INGEST_API_KEY
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
