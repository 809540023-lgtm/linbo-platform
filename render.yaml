services:
  - type: web
    name: linbo-platform
    runtime: node
    plan: starter
    region: singapore
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://ljlgwwynijqauksljvya.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: INGEST_API_KEY
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: MUX_TOKEN_ID
        sync: false
      - key: MUX_TOKEN_SECRET
        sync: false

# === Cron jobs（暫時放在 docs/render-cron-setup.md，等手動驗證後再加進來）===
# 之前在這份 blueprint 加 cron service 後，Render 部署卡住 ~50 分鐘無進展，
# 推測 cron 區塊語法不被接受。先讓 web 部署正常，cron 改用：
#   (a) Render Dashboard 手動建立 3 個 Cron Job，或
#   (b) 用外部排程器（cron-job.org / EasyCron）打 API
# 詳見 docs/render-cron-setup.md
