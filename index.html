  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a1f35;
    --bg-card-hover: #222845;
    --border-color: #2a3050;
    --text-primary: #e8ecf4;
    --text-secondary: #8892a8;
    --accent-cyan: #00f0ff;
    --accent-purple: #a855f7;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --accent-yellow: #f59e0b;
    --accent-blue: #3b82f6;
    --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.3);
    --glow-purple: 0 0 20px rgba(168, 85, 247, 0.3);
    --glow-green: 0 0 20px rgba(16, 185, 129, 0.3);
  }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(60px, 60px); }
  }

  .particles {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 3px; height: 3px;
    background: var(--accent-cyan);
    border-radius: 50%;
    opacity: 0.4;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 50px 20px 30px;
    background: linear-gradient(180deg, rgba(0,240,255,0.05) 0%, transparent 100%);
    border-bottom: 1px solid rgba(0,240,255,0.1);
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px;
    margin-bottom: 10px;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    0% { filter: drop-shadow(0 0 10px rgba(0,240,255,0.3)); }
    100% { filter: drop-shadow(0 0 25px rgba(168,85,247,0.4)); }
  }

  .header .subtitle {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
    font-size: 0.95rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header .status-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  .status-dot.green { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
  .status-dot.yellow { background: var(--accent-yellow); box-shadow: 0 0 10px var(--accent-yellow); }
  .status-dot.red { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .controls {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding: 25px 20px;
    flex-wrap: wrap;
  }

  .search-box {
    position: relative;
    width: 350px;
  }

  .search-box input {
    width: 100%;
    padding: 12px 20px 12px 45px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 0.95rem;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.3s;
    outline: none;
  }

  .search-box input:focus {
    border-color: var(--accent-cyan);
    box-shadow: var(--glow-cyan);
  }

  .search-box .search-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    font-size: 1.1rem;
  }

  .filter-btn {
    padding: 10px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    color: var(--text-secondary);
    font-size: 0.85rem;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent-cyan);
    color: var(--accent-cyan);
    box-shadow: var(--glow-cyan);
    background: rgba(0,240,255,0.05);
  }

  .main {
    position: relative;
    z-index: 10;
    max-width: 1600px;
    margin: 0 auto;
    padding: 10px 30px 60px;
  }

  .columns-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    margin-bottom: 15px;
    padding: 0 5px;
  }

  .col-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding-bottom: 10px;
    border-bottom: 2px solid;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .col-label.projects {
    color: var(--accent-cyan);
    border-color: var(--accent-cyan);
  }

  .col-label.monitors {
    color: var(--accent-purple);
    border-color: var(--accent-purple);
  }

  .col-label .icon { font-size: 1.2rem; }

  .project-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .project-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    animation: fadeInUp 0.6s ease forwards;
    opacity: 0;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 0;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent-cyan);
    box-shadow: var(--glow-cyan);
    background: var(--bg-card-hover);
  }

  .card.monitor:hover {
    border-color: var(--accent-purple);
    box-shadow: var(--glow-purple);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover::before { opacity: 1; }

  .card-preview {
    width: 100%;
    height: 180px;
    background: var(--bg-secondary);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s;
  }

  .card:hover .card-preview img {
    transform: scale(1.05);
  }

  .card-preview .placeholder {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    opacity: 0.15;
    color: var(--accent-cyan);
  }

  .card-preview .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(10,14,26,0.9) 100%);
  }

  .card-preview .visit-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    opacity: 0;
    padding: 10px 24px;
    background: rgba(0,240,255,0.15);
    border: 1px solid var(--accent-cyan);
    border-radius: 8px;
    color: var(--accent-cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
    text-decoration: none;
    z-index: 2;
  }

  .card:hover .visit-btn {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .visit-btn:hover {
    background: rgba(0,240,255,0.3);
    box-shadow: var(--glow-cyan);
  }

  .card-body {
    padding: 18px 22px;
  }

  .card-body h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-body .desc {
    color: var(--text-secondary);
    font-size: 0.85rem;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .card-body .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    padding: 3px 10px;
    background: rgba(0,240,255,0.08);
    border: 1px solid rgba(0,240,255,0.2);
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-cyan);
  }

  .tag.purple {
    background: rgba(168,85,247,0.08);
    border-color: rgba(168,85,247,0.2);
    color: var(--accent-purple);
  }

  .monitor-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .stat {
    text-align: center;
    padding: 8px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
  }

  .stat .label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .stat .value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .stat .value.green { color: var(--accent-green); }
  .stat .value.yellow { color: var(--accent-yellow); }
  .stat .value.red { color: var(--accent-red); }
  .stat .value.cyan { color: var(--accent-cyan); }

  .uptime-bar {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .uptime-bar .fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1.5s ease;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  .status-badge.online {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--accent-green);
  }

  .status-badge.warning {
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--accent-yellow);
  }

  .status-badge.offline {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--accent-red);
  }

  .footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 30px;
    border-top: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 900px) {
    .header h1 { font-size: 1.8rem; }
    .columns-header, .project-row {
      grid-template-columns: 1fr;
    }
    .columns-header { display: none; }
    .main { padding: 10px 15px 40px; }
    .card-preview { height: 140px; }
  }

  .project-row:nth-child(1) { animation-delay: 0.1s; }
  .project-row:nth-child(2) { animation-delay: 0.2s; }
  .project-row:nth-child(3) { animation-delay: 0.3s; }

  .project-row:nth-child(7) { animation-delay: 0.7s; }
  .project-row:nth-child(8) { animation-delay: 0.8s; }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 1.1rem;
    display: none;
  }

</style>

// ============================================
// RENDER
// ============================================
function renderProjects(filteredProjects) {
  const list = document.getElementById('projectList');
  const noResults = document.getElementById('noResults');
  list.innerHTML = '';

  if (filteredProjects.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  filteredProjects.forEach((p, i) => {
    const statusClass = p.status;
    const statusLabel = p.status === 'online' ? '\u25cf ONLINE' : p.status === 'warning' ? '\u26a0 WARNING' : '\u2715 OFFLINE';
    const uptimeColor = p.uptime >= 99.5 ? 'green' : p.uptime >= 98 ? 'yellow' : 'red';
    const rtColor = p.responseTime === 0 ? 'red' : p.responseTime < 200 ? 'green' : p.responseTime < 500 ? 'yellow' : 'red';

    const row = document.createElement('div');
    row.className = 'project-row';
    row.style.animationDelay = (i * 0.1) + 's';

    row.innerHTML =
      '<div class="card project">' +
        '<div class="card-preview">' +
          '<div class="placeholder">' + p.name.charAt(0) + '</div>' +
          '<div class="overlay"></div>' +
          '<a href="' + p.url + '" target="_blank" class="visit-btn">&#9654; \u524d\u5f80\u7db2\u7ad9</a>' +
        '</div>' +
        '<div class="card-body">' +
          '<h3>&#127760; ' + p.name + '</h3>' +
          '<p class="desc">' + p.desc + '</p>' +
          '<div class="tags">' +
            p.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="card monitor">' +
        '<div class="card-body" style="padding-top: 22px;">' +
          '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">' +
            '<h3>&#128225; ' + p.name + ' \u76e3\u63a7</h3>' +
            '<span class="status-badge ' + statusClass + '">' + statusLabel + '</span>' +
          '</div>' +
          '<div class="monitor-stats">' +
            '<div class="stat"><div class="label">Uptime</div><div class="value ' + uptimeColor + '">' + p.uptime + '%</div></div>' +
            '<div class="stat"><div class="label">Response</div><div class="value ' + rtColor + '">' + (p.responseTime ? p.responseTime + 'ms' : 'N/A') + '</div></div>' +
            '<div class="stat"><div class="label">Last Issue</div><div class="value cyan" style="font-size:0.75rem;">' + p.lastIncident + '</div></div>' +
          '</div>' +
          '<div class="uptime-bar"><div class="fill" style="width: ' + p.uptime + '%;"></div></div>' +
          '<div style="display: flex; justify-content: space-between; align-items: center;">' +
            '<div class="tags">' +
              '<span class="tag purple">24/7 Monitor</span>' +
              '<span class="tag purple">Alert</span>' +
            '</div>' +
            '<a href="' + p.monitorUrl + '" target="_blank" style="padding:6px 14px;font-size:0.75rem;background:rgba(168,85,247,0.15);border:1px solid var(--accent-purple);border-radius:8px;color:var(--accent-purple);font-family:JetBrains Mono,monospace;text-decoration:none;transition:all 0.3s;">&#128202; \u67e5\u770b\u76e3\u63a7</a>' +
          '</div>' +
        '</div>' +
      '</div>';

    list.appendChild(row);
  });
}

// ============================================
// SEARCH & FILTER
// ============================================
var currentFilter = 'all';

function applyFilters() {
  var query = document.getElementById('searchInput').value.toLowerCase().trim();
  var filtered = projects;

  if (currentFilter !== 'all') {
    filtered = filtered.filter(function(p) { return p.status === currentFilter; });
  }

  if (query) {
    filtered = filtered.filter(function(p) {
      return p.name.toLowerCase().indexOf(query) !== -1 ||
             p.desc.toLowerCase().indexOf(query) !== -1 ||
             p.tags.some(function(t) { return t.toLowerCase().indexOf(query) !== -1; });
    });
  }

  renderProjects(filtered);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});

// ============================================
// STATUS COUNTS
// ============================================
function updateStatusCounts() {
  document.getElementById('onlineCount').textContent = projects.filter(function(p) { return p.status === 'online'; }).length;
  document.getElementById('warningCount').textContent = projects.filter(function(p) { return p.status === 'warning'; }).length;
  document.getElementById('offlineCount').textContent = projects.filter(function(p) { return p.status === 'offline'; }).length;
}

// ============================================
// CLOCK
// ============================================
function updateClock() {
  var now = new Date();
  document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
}
setInterval(updateClock, 1000);

// ============================================
// PARTICLES
// ============================================
function createParticles() {
  var container = document.getElementById('particles');
  for (var i = 0; i < 30; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
    if (Math.random() > 0.5) p.style.background = 'var(--accent-purple)';
    container.appendChild(p);
  }
}

// ============================================
// INIT
// ============================================
createParticles();
updateStatusCounts();
updateClock();
renderProjects(projects);
</script>
