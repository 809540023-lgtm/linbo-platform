    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;

    --accent-cyan: #06b6d4;
    --accent-green: #10b981;
    --accent-yellow: #f59e0b;
    --accent-red: #ef4444;
    --accent-purple: #8b5cf6;
    --border-color: #1e293b;
    --gradient-primary: linear-gradient(135deg, #3b82f6, #06b6d4);
    --gradient-secondary: linear-gradient(135deg, #8b5cf6, #ec4899);
    --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
    --shadow-glow: 0 0 20px rgba(59,130,246,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .bg-animation {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 40% 80%, rgba(139,92,246,0.05) 0%, transparent 50%);
    z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px; }

  /* Header */
  .header {
    text-align: center; padding: 40px 20px 30px;
    background: linear-gradient(180deg, rgba(59,130,246,0.1) 0%, transparent 100%);
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 30px; border-radius: 16px 16px 0 0;
  }
  .header h1 {
    font-size: 2.2rem; font-weight: 800;
    background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header .subtitle { color: var(--text-secondary); font-size: 1rem; }
  .header .stats-bar {
    display: flex; justify-content: center; gap: 30px; margin-top: 20px; flex-wrap: wrap;
  }
  .stat-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-card); padding: 8px 16px; border-radius: 20px;
    border: 1px solid var(--border-color);
  }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .stat-dot.green { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
  .stat-dot.yellow { background: var(--accent-yellow); }
  .stat-dot.blue { background: var(--accent-blue); }
  .stat-number { font-weight: 700; font-size: 1.1rem; }
  .stat-label { color: var(--text-muted); font-size: 0.85rem; }

  /* Controls */
  .controls {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    align-items: center; justify-content: space-between;
  }
  .search-box {
    flex: 1; min-width: 200px; padding: 10px 16px; border-radius: 10px;
    border: 1px solid var(--border-color); background: var(--bg-card);
    color: var(--text-primary); font-size: 0.95rem; outline: none;
    transition: border-color 0.3s;
  }
  .search-box:focus { border-color: var(--accent-blue); }
  .filter-btn {
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color);
    background: var(--bg-card); color: var(--text-secondary); cursor: pointer;
    font-size: 0.85rem; transition: all 0.3s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent-blue); color: white; border-color: var(--accent-blue);
  }

  /* Grid */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* Card */
  .project-card {
    background: var(--bg-card); border: 1px solid var(--border-color);
    border-radius: 14px; padding: 22px; cursor: pointer;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .project-card:hover {
    transform: translateY(-4px); border-color: var(--accent-blue);
    box-shadow: var(--shadow-glow);
  }
  .project-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--gradient-primary); opacity: 0; transition: opacity 0.3s;
  }
  .project-card:hover::before { opacity: 1; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-title { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); line-height: 1.4; flex: 1; }
  .status-badge {
    padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
    white-space: nowrap; margin-left: 10px;
  }
  .status-online { background: rgba(16,185,129,0.15); color: var(--accent-green); }
  .status-warning { background: rgba(245,158,11,0.15); color: var(--accent-yellow); }
  .status-offline { background: rgba(239,68,68,0.15); color: var(--accent-red); }
  .card-desc { color: var(--text-secondary); font-size: 0.88rem; line-height: 1.5; margin-bottom: 14px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .tag {
    padding: 3px 10px; border-radius: 6px; font-size: 0.75rem;
    background: rgba(59,130,246,0.12); color: var(--accent-cyan); border: 1px solid rgba(59,130,246,0.2);
  }
  .card-metrics { display: flex; gap: 16px; font-size: 0.8rem; color: var(--text-muted); }
  .metric { display: flex; align-items: center; gap: 4px; }
  .card-footer {
    margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-color);
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-id { font-size: 0.75rem; color: var(--text-muted); }
  .card-link {
    font-size: 0.8rem; color: var(--accent-blue); text-decoration: none;
    display: flex; align-items: center; gap: 4px;
  }
  .card-link:hover { color: var(--accent-cyan); }

  /* Responsive */
  @media (max-width: 768px) {
    .projects-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.6rem; }
    .controls { flex-direction: column; }
  }

  /* Pulse animation */
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .pulse { animation: pulse 2s infinite; }

  /* Monitor modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-secondary); border: 1px solid var(--border-color);
    border-radius: 16px; padding: 30px; max-width: 500px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h2 { margin-bottom: 16px; font-size: 1.2rem; }
  .modal .status-detail { margin-bottom: 12px; }
  .modal .close-btn {
    margin-top: 20px; padding: 10px 24px; background: var(--accent-blue);
    color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem;
  }

  /* Last updated */
  .last-updated {
    text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.85rem;
  }
</style>
</head>

      <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="card-metrics">
        <span class="metric">可用率 ${p.uptime}%</span>
        <span class="metric">回應 ${p.responseTime}ms</span>
      </div>
      <div class="card-footer">
        <span class="card-id">#${String(p.id).padStart(2,'0')}</span>
        <a class="card-link" href="${p.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">開啟 &#8599;</a>
      </div>
    </div>
  `).join('');
}

function openProject(url) { window.open(url, '_blank', 'noopener'); }

// Search & Filter
let currentFilter = 'all';
document.getElementById('searchBox').addEventListener('input', applyFilters);
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});

function applyFilters() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let filtered = projects;
  if (currentFilter !== 'all') {
    filtered = filtered.filter(p => p.tags.some(t => t.includes(currentFilter)));
  }
  if (q) {
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  renderProjects(filtered);
}

// Modal
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// Stats
function updateStats() {
  document.getElementById('totalProjects').textContent = projects.length;
  const online = projects.filter(p => p.status === 'online').length;
  document.getElementById('onlineCount').textContent = online;
  const avgUp = (projects.reduce((s, p) => s + p.uptime, 0) / projects.length).toFixed(1);
  document.getElementById('avgUptime').textContent = avgUp + '%';
}

// Init
document.getElementById('lastUpdated').textContent = new Date().toLocaleString('zh-TW');
updateStats();
renderProjects(projects);
</script>
</body>
</html>
